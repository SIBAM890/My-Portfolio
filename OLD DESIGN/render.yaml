# Render Blueprint Specification
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: portfolio
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Rewrite all requests to index.html for SPA routing (React Router support)
      - type: rewrite
        source: /*
        destination: /index.html
