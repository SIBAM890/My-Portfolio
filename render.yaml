services:
  - type: web
    name: sibam-portfolio
    env: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /Sibam.png
        name: Cache-Control
        value: public, max-age=86400
      - path: /neo-styles.css
        name: Cache-Control
        value: public, max-age=86400
      - path: /script.js
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
